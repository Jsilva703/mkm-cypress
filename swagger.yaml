openapi: 3.0.0
info:
  title: Comandos Cypress para Portal MKOM
  description: Documentação dos comandos Cypress para interação com o portal MKOM
  version: 1.0.0

paths:
  /loginCypress:
    post:
      summary: Realiza o login no portal MKOM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                auth_domain:
                  type: string
                auth_login:
                  type: string
                auth_senha:
                  type: string
              required:
                - auth_domain
                - auth_login
                - auth_senha
      responses:
        '200':
          description: Login bem-sucedido

  /visitarURL:
    get:
      summary: Visita a URL inicial do portal MKOM
      responses:
        '200':
          description: Página carregada com sucesso


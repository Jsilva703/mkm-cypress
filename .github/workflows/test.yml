name: Cypress Tests

on:
  push:
    branches:
      - principal
  pull_request:
    branches:
      - principal

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Cache npm dependencies
        uses: actions/cache@v2
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Run Cypress tests
        run: npm run teste
        env:
          CI: true

      - name: Archive test results
        uses: actions/upload-artifact@v2
        with:
          name: mochawesome-report
          path: cypress/reports

      - name: Archive screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v2
        with:
            name: cypress-screenshots
            path: cypress/screenshots
   
      - name: Archive videos on failure
        if: failure()
        uses: actions/upload-artifact@v2
        with:
            name: cypress-videos
            path: cypress/videos

      - name: Capture Cypress test summary
        run: |
              npx cypress run > cypress/reports/test-summary.txt
          

      - name: Send notification to Microsoft Teams
        if: failure()
        run: |
            WEBHOOK_URL="https://mkmservicecom.webhook.office.com/webhookb2/a11da518-494e-4b92-ab2e-eae01ec8ff11@6bb1f81b-c7c7-4eec-a417-11ceb617097d/IncomingWebhook/73006ad307184662bfbe7b39dec2a5f3/6707798e-6692-4adb-8ec0-09ea01b9bb94"
            curl -X POST -H "Content-Type: application/json" -d '{
              "@type": "MessageCard",
              "@context": "http://schema.org/extensions",
              "summary": "Cypress Test Results",
              "themeColor": "FF0000",
              "sections": [{
                "activityTitle": "Cypress Test Suite Failed",
                "activitySubtitle": "A test run has failed. Please check the details below.",
                "facts": [{
                  "name": "Repository",
                  "value": "${{ github.repository }}"
                }, {
                  "name": "Workflow",
                  "value": "${{ github.workflow }}"
                }, {
                  "name": "Action Details",
                  "value": "[View Action Logs](https://github.com/Joao848846/mkm-cypress/actions)"
                   },
                {
                  "name": "Branch",
                  "value": "${{ github.ref }}"
                }, {
                  "name": "Commit",
                  "value": "${{ github.sha }}"
                }],
                "markdown": true,
                \"text\": \"**Test Summary:**\n\`\`\`\n$TEST_SUMMARY\n\`\`\`\"
              }]
            }' $WEBHOOK_URL

      
        
        
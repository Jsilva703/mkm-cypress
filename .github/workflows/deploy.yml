name: Deploy

on:
  workflow_dispatch:  # Permite iniciar manualmente
  push:
   

jobs:
  validate-setup:
    runs-on: ubuntu-latest

    steps:
      - name: Log workflow dispatch
        run: echo "Workflow dispatched at $(date)"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '14'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      # Etapa opcional: Verificar se as dependências foram instaladas corretamente
      - name: Verify dependencies
        run: |
          node --version
          npm --version
          yarn --version

      # Etapa opcional: Simular sucesso ou falha para testar notificações do Cronitor
      - name: Simulate success
        if: always()  # Sempre executa para testar notificação de sucesso
        run: echo "Simulating successful job"

      - name: Archive logs
        uses: actions/upload-artifact@v4
        with:
          name: job-logs
          path: |
            *.log
            *.txt
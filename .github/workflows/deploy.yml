name: Deploy

on:
  workflow_dispatch:  # Permite iniciar manualmente
  push:
    branches:
      - main  
  pull_request:
    branches:
      - main  

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'  # Altere para a versão do Node.js que você está usando

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build  # Altere para o comando de build do seu projeto

      - name: Deploy to server
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          echo "${DEPLOY_KEY}" > deploy_key
          chmod 600 deploy_key
          rsync -avz -e "ssh -i deploy_key" ./build/ user@server:/path/to/deploy
          echo "Deploy completed."
